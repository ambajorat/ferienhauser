<head>

<style>
:root{
  --nebel:#EDF0EE; --karte:#FCFCFA; --tinte:#1C2B2F;
  --falu:#9C3F2E; --falu-dunkel:#7E3123; --fichte:#48685D;
  --linie:#C7D1CB; --gedimmt:#5C6B67;
}
*{box-sizing:border-box}
body{
  margin:0; background:var(--nebel); color:var(--tinte);
  font-family:"Public Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  font-size:16px; line-height:1.55;
}
.hülle{max-width:880px; margin:0 auto; padding:32px 20px 80px}

header h1{
  font-family:"Bricolage Grotesque","Public Sans",sans-serif;
  font-weight:700; font-size:clamp(30px,5vw,44px);
  letter-spacing:-0.02em; margin:0 0 4px;
}
header h1 .rot{color:var(--falu)}
.stats{
  font-family:"IBM Plex Mono",monospace; font-size:13px; color:var(--gedimmt);
  margin:0 0 28px;
}

/* Filterleiste */
.filter{
  display:flex; flex-wrap:wrap; gap:10px; align-items:center;
  padding:14px 16px; background:var(--karte);
  border:1px solid var(--linie); border-radius:12px; margin-bottom:26px;
}
.chips{display:flex; gap:6px}
.chip{
  font-family:"IBM Plex Mono",monospace; font-size:13px;
  padding:6px 12px; border-radius:999px; border:1px solid var(--linie);
  background:transparent; color:var(--tinte); cursor:pointer;
}
.chip[aria-pressed="true"]{background:var(--tinte); color:var(--nebel); border-color:var(--tinte)}
.filter select,.filter input[type=search]{
  font:inherit; font-size:14px; padding:7px 10px; border-radius:8px;
  border:1px solid var(--linie); background:var(--nebel); color:var(--tinte);
}
.filter input[type=search]{flex:1; min-width:140px}
.schalter{display:flex; align-items:center; gap:7px; font-size:14px; cursor:pointer; white-space:nowrap}
.schalter input{accent-color:var(--falu); width:16px; height:16px}
.chip:focus-visible,.filter select:focus-visible,.filter input:focus-visible,
.schalter input:focus-visible,.knopf:focus-visible{
  outline:2px solid var(--falu); outline-offset:2px;
}

/* Ticket-Karten */
.liste{display:flex; flex-direction:column; gap:16px}
.ticket{
  display:flex; background:var(--karte); border:1px solid var(--linie);
  border-radius:14px; overflow:hidden; position:relative;
}
.abriss{
  flex:0 0 96px; display:flex; flex-direction:column; justify-content:center;
  align-items:center; gap:2px; padding:18px 10px;
  border-right:2px dashed var(--linie); position:relative;
}
/* Perforations-Ausstanzungen */
.abriss::before,.abriss::after{
  content:""; position:absolute; right:-9px; width:16px; height:16px;
  border-radius:50%; background:var(--nebel); border:1px solid var(--linie);
}
.abriss::before{top:-9px}
.abriss::after{bottom:-9px}
.punkte{
  font-family:"IBM Plex Mono",monospace; font-weight:600;
  font-size:30px; line-height:1; color:var(--falu);
}
.ticket.abgelehnt .punkte{color:var(--gedimmt)}
.von-zehn{font-family:"IBM Plex Mono",monospace; font-size:12px; color:var(--gedimmt)}
.status{
  margin-top:8px; font-size:11px; font-family:"IBM Plex Mono",monospace;
  padding:2px 8px; border-radius:999px;
}
.status.ja{background:#E4EDE6; color:var(--fichte)}
.status.nein{background:#EEE7E4; color:var(--gedimmt)}

.inhalt{flex:1; padding:18px 20px; min-width:0}
.inhalt h2{
  font-family:"Bricolage Grotesque","Public Sans",sans-serif;
  font-weight:700; font-size:20px; margin:0 0 2px; letter-spacing:-0.01em;
}
.meta{
  font-family:"IBM Plex Mono",monospace; font-size:12.5px;
  color:var(--fichte); margin:0 0 10px;
}
.inhalt p{margin:0 0 10px; font-size:15px}
.highlights{color:var(--gedimmt); font-style:italic; font-size:14px}
.fuss{
  display:flex; justify-content:space-between; align-items:center;
  flex-wrap:wrap; gap:8px; margin-top:12px;
}
.quelle{font-size:12.5px; color:var(--gedimmt)}
.knopf{
  font:600 14px "Public Sans",sans-serif; text-decoration:none;
  color:var(--nebel); background:var(--falu);
  padding:8px 16px; border-radius:8px;
}
.knopf:hover{background:var(--falu-dunkel)}
.leer{
  text-align:center; padding:60px 20px; color:var(--gedimmt);
  background:var(--karte); border:1px dashed var(--linie); border-radius:14px;
}

@media (max-width:560px){
  .ticket{flex-direction:column}
  .abriss{flex-direction:row; border-right:none; border-bottom:2px dashed var(--linie); padding:12px}
  .abriss::before{top:auto; bottom:-9px; left:-9px; right:auto}
  .abriss::after{bottom:-9px; right:-9px}
  .status{margin-top:0; margin-left:auto}
}
@media (prefers-reduced-motion:no-preference){
  .ticket{transition:transform .15s ease}
  .ticket:hover{transform:translateY(-2px)}
}
</style>
</head>

let minScore = 7;

const quelleSel = document.getElementById('quelleFilter');
[...new Set(DATEN.map(d => d.quelle).filter(Boolean))].sort().forEach(q => {
  const o = document.createElement('option'); o.value = q; o.textContent = q;
  quelleSel.appendChild(o);
});

function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

function zeichne(){
  const suchwort = document.getElementById('suche').value.toLowerCase();
  const quelle = quelleSel.value;
  const nurGeeignete = document.getElementById('nurGeeignete').checked;
  const liste = document.getElementById('liste');
  liste.innerHTML = '';
  let n = 0;
  for (const d of DATEN){
    if (d.score < minScore) continue;
    if (nurGeeignete && !d.geeignet) continue;
    if (quelle && d.quelle !== quelle) continue;
    if (suchwort){
      const heu = (d.titel+' '+d.region+' '+d.begruendung+' '+d.highlights).toLowerCase();
      if (!heu.includes(suchwort)) continue;
    }
    n++;
    const meta = [d.region, d.fahrzeit].filter(Boolean).join(' · ');
    const el = document.createElement('article');
    el.className = 'ticket' + (d.geeignet ? '' : ' abgelehnt');
    el.innerHTML = `
      <div class="abriss">
        <span class="punkte">${d.score}</span>
        <span class="von-zehn">/10</span>
        <span class="status ${d.geeignet?'ja':'nein'}">${d.geeignet?'geeignet':'geprüft'}</span>
      </div>
      <div class="inhalt">
        <h2>${esc(d.titel)}</h2>
        ${meta ? `<p class="meta">${esc(meta)}</p>` : ''}
        ${d.begruendung ? `<p>${esc(d.begruendung)}</p>` : ''}
        ${d.highlights ? `<p class="highlights">${esc(d.highlights)}</p>` : ''}
        <div class="fuss">
          <span class="quelle">${esc(d.quelle)}${d.gesehen_am ? ' · ' + esc(d.gesehen_am) : ''}</span>
          <a class="knopf" href="${esc(d.url)}" target="_blank" rel="noopener">Inserat öffnen</a>
        </div>
      </div>`;
    liste.appendChild(el);
  }
  document.getElementById('leer').hidden = n > 0;
}

document.querySelectorAll('#scoreChips .chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('#scoreChips .chip').forEach(c => c.setAttribute('aria-pressed','false'));
    chip.setAttribute('aria-pressed','true');
    minScore = parseInt(chip.dataset.min, 10);
    zeichne();
  });
});
quelleSel.addEventListener('change', zeichne);
document.getElementById('suche').addEventListener('input', zeichne);
document.getElementById('nurGeeignete').addEventListener('change', zeichne);
zeichne();
</script>
